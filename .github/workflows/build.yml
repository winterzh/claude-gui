name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 8 * * 1"  # Every Monday 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare resources (bundle Node.js + Claude Code)
        run: pwsh scripts/prepare-resources-win.ps1

      - name: Verify resources
        run: |
          dir src-tauri\resources\node\
          dir src-tauri\resources\claude-code\node_modules\@anthropic-ai\claude-code\cli.js

      - name: Generate tag for scheduled builds
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: auto_tag
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          echo "tag=auto-$date" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || steps.auto_tag.outputs.tag }}
          releaseName: "Claude Code Launcher ${{ github.event_name == 'push' && github.ref_name || steps.auto_tag.outputs.tag }}"
          releaseBody: |
            ## Claude Code Launcher

            Download the .exe installer below. Node.js and Claude Code are bundled — no extra installation needed.

            1. Install the .exe
            2. Open the app, enter your API Key and Base URL
            3. Choose a working directory
            4. Click "Launch Claude Code"
          releaseDraft: false
          prerelease: false
