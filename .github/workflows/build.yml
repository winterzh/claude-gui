name: Build Installers

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 8 * * 1"  # Every Monday 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            prep: pwsh scripts/prepare-resources-win.ps1
            label: Windows
          - platform: macos-latest
            prep: bash scripts/prepare-resources.sh
            label: macOS
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Write packaging config
        env:
          PACKAGING_CONFIG: ${{ secrets.PACKAGING_CONFIG }}
        shell: bash
        run: |
          if [ -n "$PACKAGING_CONFIG" ]; then
            mkdir -p config-packaging
            printf '%s' "$PACKAGING_CONFIG" > config-packaging/config.json
          fi

      - name: Apply packaging config
        if: ${{ hashFiles('config-packaging/config.json') != '' }}
        run: node scripts/apply-packaging-config.mjs

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare resources (bundle Node.js + Claude Code native binary)
        run: ${{ matrix.prep }}

      - name: Verify resources
        shell: bash
        run: |
          # Claude Code 2.1.x ships a native binary at this path on every OS
          # (the .exe extension is preserved cross-platform by the npm package).
          ls -la "src-tauri/resources/claude-code/node_modules/@anthropic-ai/claude-code/bin/claude.exe"
          if [ "${{ runner.os }}" = "Windows" ]; then
            ls -la src-tauri/resources/node/node.exe
          else
            ls -la src-tauri/resources/node/bin/node
          fi

      - name: Generate tag for scheduled builds
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: auto_tag
        shell: bash
        run: echo "tag=auto-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || steps.auto_tag.outputs.tag }}
          releaseName: "Claude Code Launcher ${{ github.event_name == 'push' && github.ref_name || steps.auto_tag.outputs.tag }}"
          releaseBody: |
            ## Claude Code Launcher

            一键启动器,内置 Node.js + Claude Code 原生二进制,免装。

            - **Windows**: 下载 `.exe` 安装包(x64)
            - **macOS**: 下载 `.dmg`(Apple Silicon)

            使用步骤:
            1. 安装并打开应用
            2. 填入 API Key 和 Base URL(或一键 DeepSeek v4 预设)
            3. 选择工作目录
            4. 点击 "启动 Claude Code"
          releaseDraft: false
          prerelease: false
