name: Build Mac Intel (one-off)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the Intel DMG to"
        required: true
        default: "v0.9.8"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Write packaging config
        env:
          PACKAGING_CONFIG: ${{ secrets.PACKAGING_CONFIG }}
        shell: bash
        run: |
          if [ -n "$PACKAGING_CONFIG" ]; then
            mkdir -p config-packaging
            printf '%s' "$PACKAGING_CONFIG" > config-packaging/config.json
          fi

      - name: Apply packaging config
        if: ${{ hashFiles('config-packaging/config.json') != '' }}
        run: node scripts/apply-packaging-config.mjs

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare resources (bundle Node.js + Claude Code native binary)
        run: bash scripts/prepare-resources.sh

      - name: Verify resources
        shell: bash
        run: |
          ls -la "src-tauri/resources/claude-code/node_modules/@anthropic-ai/claude-code/bin/claude.exe"
          ls -la src-tauri/resources/node/bin/node
          file src-tauri/resources/claude-code/node_modules/@anthropic-ai/claude-code/bin/claude.exe

      - name: Build Tauri app (Intel x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "Claude Code Launcher ${{ inputs.tag }}"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin
